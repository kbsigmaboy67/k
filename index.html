<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        
        :root {
            --k-red: #ff0033;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .browser-window {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .tab-bar {
            scrollbar-width: none;
        }
        
        .tab-bar::-webkit-scrollbar {
            display: none;
        }
        
        .active-tab {
            background-color: #111113;
            box-shadow: 0 0 0 1px #ff0033 inset;
            position: relative;
        }
        
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff0033, #ff6699);
        }
        
        .address-bar {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .address-bar:focus-within {
            box-shadow: 0 0 0 3px rgba(255, 0, 51, 0.3);
        }
        
        .iframe-container {
            background: #0a0a0a;
            box-shadow: 
                0 0 20px -5px rgb(255 0 51),
                inset 0 0 80px -20px rgb(255 102 153);
        }
        
        .hacker-bg {
            background: 
                linear-gradient(90deg, rgba(255,0,51,0.03) 1px, transparent 1px),
                linear-gradient(rgba(255,0,51,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: hacker-grid 20s linear infinite;
        }
        
        @keyframes hacker-grid {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .context-menu {
            animation: contextPop 0.15s ease;
        }
        
        /* FIX: Ensure tab contents never overlap visually */
        .tab-content {
            position: absolute;
            inset: 0;
            display: none;
            z-index: 1;
        }
        
        .tab-content.active {
            display: flex !important;
            z-index: 100;
        }
    </style>
</head>
<body class="browser-window bg-[#0a0a0a] text-white h-screen flex flex-col overflow-hidden select-none">
    <!-- TAB BAR -->
    <div id="tab-bar" class="tab-bar flex items-end bg-[#111113] border-b border-[#222226] h-12 px-2 pt-2 overflow-x-auto hacker-bg">
        <!-- Tabs populated by JS -->
    </div>

    <!-- TOOLBAR -->
    <div class="flex items-center gap-3 bg-[#111113] border-b border-[#222226] px-4 py-2.5 text-sm">
        
        <!-- Navigation -->
        <div class="flex items-center gap-1">
            <button onclick="goBack()" 
                    class="w-9 h-9 flex items-center justify-center hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <button onclick="goForward()" 
                    class="w-9 h-9 flex items-center justify-center hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <button onclick="reloadTab()" 
                    class="w-9 h-9 flex items-center justify-center hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15m-6 0a8 8 0 01-7.714-6.314" />
                </svg>
            </button>
        </div>

        <!-- Address Bar -->
        <div id="address-bar-container" onclick="focusAddressBar(event)" 
             class="address-bar flex-1 max-w-3xl mx-auto bg-[#1a1a1f] border border-[#333337] rounded-3xl px-5 py-1.5 flex items-center gap-3 text-base shadow-inner">
            <div class="text-[#ff0033]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 8.944 11.922.42.095.858.143 1.295.143a3 3 0 01.555-.057z" />
                </svg>
            </div>
            <input id="address-input" 
                   type="text" 
                   class="flex-1 bg-transparent outline-none text-white placeholder-[#77777c] text-[15px] font-medium"
                   placeholder="Search or enter web address"
                   onkeydown="if(event.key === 'Enter') handleAddressSubmit()">
            <div onclick="toggleSandbox()" id="sandbox-indicator"
                 class="px-3 py-0.5 text-[10px] font-mono rounded-2xl bg-[#ff0033]/10 text-[#ff0033] flex items-center gap-1 cursor-pointer hover:bg-[#ff0033]/20">
                <span id="sandbox-text">SANDBOX ON</span>
                <div class="w-2 h-2 bg-[#ff0033] rounded-full animate-pulse"></div>
            </div>
        </div>

        <!-- Right controls -->
        <div class="flex items-center gap-2">
            <button onclick="createNewTab()" 
                    class="flex items-center justify-center w-9 h-9 hover:bg-white/10 rounded-2xl text-[#ff6699] text-2xl leading-none font-light">+</button>
            
            <button onclick="toggleSplitView()" 
                    class="flex items-center justify-center w-9 h-9 hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0v12m0-12L19 19M3 12h8" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h2M3 19h2" />
                </svg>
            </button>
            
            <button onclick="showBookmarksPanel()" 
                    class="flex items-center justify-center w-9 h-9 hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2V5a2 2 0 01-2-2v.341C7.67 6.165 6 8.388 6 11v5.159c0 .538-.214 1.055-.595 1.436L4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1l-1.405-1.405A2.002 2.002 0 0118 16.159V11c0-2.612-1.67-4.835-4-5.659V5a2 2 0 01-2-2z" />
                </svg>
            </button>
            
            <button onclick="openSiteMaker()" 
                    class="flex items-center px-4 h-9 bg-gradient-to-r from-[#ff0033] to-[#ff6699] hover:from-[#ff1133] hover:to-[#ff77aa] rounded-3xl text-white text-sm font-medium shadow-lg shadow-[#ff0033]/50">
                <span class="mr-1">✦</span> SITE MAKER
            </button>
            
            <button onclick="openNewWindow()" 
                    class="flex items-center justify-center w-9 h-9 hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L9 15" />
                </svg>
            </button>
            
            <button onclick="showMainMenu(event)" 
                    class="flex items-center justify-center w-9 h-9 hover:bg-white/10 rounded-2xl text-[#ff6699]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 12h.01M12 12h.01M19 12h.01M6 12a2 2 0 11-4 0 2 2 0 014 0zm7 0a2 2 0 11-4 0 2 2 0 014 0zm7 0a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            </button>
            
            <div onclick="fakeProfileClick()" class="w-8 h-8 bg-gradient-to-br from-[#ff0033] to-[#ff6699] rounded-2xl flex items-center justify-center text-xs font-bold cursor-pointer">K</div>
        </div>
    </div>

    <!-- CONTENT AREA -->
    <div id="contents-container" class="flex-1 relative bg-[#0a0a0a] overflow-hidden flex hacker-bg">
        <!-- All tab contents stay in DOM here – never unloaded -->
    </div>

    <!-- BOOKMARKS PANEL -->
    <div onclick="if(event.target.id === 'bookmarks-panel')hideBookmarksPanel()" 
         id="bookmarks-panel" 
         class="hidden fixed inset-0 bg-black/70 z-50 flex justify-end">
        <div onclick="event.stopImmediatePropagation()" 
             class="w-96 bg-[#111113] h-full shadow-2xl flex flex-col">
            <div class="px-6 py-5 border-b border-[#222226] flex items-center justify-between">
                <h2 class="text-xl font-semibold">Bookmarks</h2>
                <button onclick="hideBookmarksPanel()" class="text-3xl leading-none text-[#ff6699]">×</button>
            </div>
            
            <div id="bookmarks-list" class="flex-1 overflow-auto px-3 py-2">
                <!-- Populated by JS -->
            </div>
            
            <div class="p-4 border-t border-[#222226]">
                <button onclick="addCurrentToBookmarks()" 
                        class="w-full py-4 bg-[#ff0033] hover:bg-[#ff1133] rounded-3xl text-white font-medium flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                    ADD CURRENT PAGE
                </button>
            </div>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu" onclick="if(event.target.id==='context-menu')hideContextMenu()" 
         class="hidden fixed z-[9999] bg-[#1a1a1f] border border-[#333337] shadow-2xl rounded-3xl py-2 text-sm font-medium w-64 context-menu">
    </div>

    <!-- MODALS -->
    <div id="modal-backdrop" onclick="if(event.target.id==='modal-backdrop')hideModal()" 
         class="hidden fixed inset-0 bg-black/70 z-[10000] flex items-center justify-center">
        <div id="modal-content" class="modal bg-[#111113] w-full max-w-lg mx-4 rounded-3xl shadow-2xl overflow-hidden">
        </div>
    </div>

    <script>
        // Tailwind
        function initTailwind() {
            tailwind.config = { content: [], theme: { extend: { colors: { kred: '#ff0033' } } } }
        }

        // Global state – FIXED: explicit tracking
        let tabs = []
        let activeTabId = null
        let sandboxEnabled = true
        let nextZIndex = 10
        let bookmarks = JSON.parse(localStorage.getItem('kbrowser_bookmarks')) || [
            { id: 1, name: "GitHub", url: "https://github.com", favicon: "https://www.google.com/s2/favicons?sz=32&domain=github.com" },
            { id: 2, name: "YouTube", url: "https://youtube.com", favicon: "https://www.google.com/s2/favicons?sz=32&domain=youtube.com" },
            { id: 3, name: "xAI", url: "https://x.ai", favicon: "https://www.google.com/s2/favicons?sz=32&domain=x.ai" }
        ]
        
        let siteMakerTabId = null   // FIXED: dedicated ID for site maker so we never lose it

        function generateId() {
            return 'tab-' + Math.random().toString(36).slice(2) + Date.now()
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar')
            bar.innerHTML = ''
            
            tabs.forEach(tab => {
                const isActive = tab.id === activeTabId
                const tabEl = document.createElement('div')
                tabEl.className = `group flex items-center gap-2.5 px-5 py-2 mx-1 rounded-t-3xl text-sm font-medium cursor-pointer select-none ${isActive ? 'active-tab' : 'bg-[#1a1a1f] hover:bg-[#222226]'}`
                tabEl.dataset.id = tab.id
                
                const fav = document.createElement('img')
                fav.src = tab.favicon || 'https://www.google.com/s2/favicons?sz=32&domain=example.com'
                fav.className = 'w-4 h-4 rounded'
                tabEl.appendChild(fav)
                
                const titleSpan = document.createElement('span')
                titleSpan.textContent = tab.title || 'Untitled'
                titleSpan.className = 'max-w-[160px] truncate'
                tabEl.appendChild(titleSpan)
                
                const closeBtn = document.createElement('button')
                closeBtn.innerHTML = '✕'
                closeBtn.className = `ml-2 w-5 h-5 flex items-center justify-center text-[#ff6699] hover:text-white rounded-full hover:bg-[#ff0033]/20 text-xs opacity-0 group-hover:opacity-100 ${isActive ? 'opacity-70' : ''}`
                closeBtn.onclick = (e) => { e.stopImmediatePropagation(); closeTab(tab.id) }
                tabEl.appendChild(closeBtn)
                
                tabEl.addEventListener('click', () => switchTab(tab.id))
                tabEl.addEventListener('contextmenu', (e) => { e.preventDefault(); showTabContextMenu(e, tab.id) })
                
                bar.appendChild(tabEl)
            })
            
            // New tab button always at end
            const newTabBtn = document.createElement('div')
            newTabBtn.className = 'ml-auto mr-3 flex items-center justify-center w-9 h-9 text-3xl font-light text-[#ff6699] hover:text-white cursor-pointer'
            newTabBtn.innerHTML = '+'
            newTabBtn.onclick = createNewTab
            bar.appendChild(newTabBtn)
        }

        // FIXED: robust switchTab – no more confusion about which tab is visible
        function switchTab(id) {
            activeTabId = id
            
            // Hide EVERY tab content cleanly
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active')
                el.style.display = 'none'
                el.style.zIndex = '1'
            })
            
            const content = document.getElementById(`content-${id}`)
            if (content) {
                content.classList.add('active')
                content.style.display = 'flex'
                content.style.zIndex = String(nextZIndex++)
                
                // Update address bar with the REAL current URL of this tab
                const tab = tabs.find(t => t.id === id)
                if (tab) {
                    const input = document.getElementById('address-input')
                    input.value = tab.url && tab.url !== 'kbrowser://newtab' && tab.url !== 'kbrowser://sitemaker' 
                        ? tab.url 
                        : ''
                }
            }
            
            renderTabs()
        }

        function createNewTab() {
            const id = generateId()
            const tab = {
                id: id,
                title: 'New Tab',
                url: 'kbrowser://newtab',
                favicon: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 viewBox=%220 0 32 32%22%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%2214%22 fill=%22none%22 stroke=%22%23ff0033%22 stroke-width=%223%22/%3E%3Ctext x=%2216%22 y=%2222%22 text-anchor=%22middle%22 fill=%22%23ff0033%22 font-size=%2220%22%3EK%3C/text%3E%3C/svg%3E',
                type: 'newtab',
                split: false
            }
            tabs.push(tab)
            
            const container = document.getElementById('contents-container')
            const contentDiv = document.createElement('div')
            contentDiv.id = `content-${id}`
            contentDiv.className = 'tab-content'
            contentDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center hacker-bg p-10">
                    <div class="text-[120px] leading-none font-black mb-6 tracking-[-10px]" style="color: #ff0033; text-shadow: 0 0 60px #ff0033;">K</div>
                    <h1 class="text-6xl font-semibold mb-3 text-white" style="font-family: 'Space Grotesk', sans-serif;">K Browser</h1>
                    <p class="text-[#ff6699] text-2xl mb-12">dark • smooth • red • gamer</p>
                    
                    <div class="w-full max-w-2xl bg-[#1a1a1f] border border-[#333337] rounded-3xl px-8 py-6 flex items-center shadow-inner">
                        <input id="newtab-input-${id}" type="text" placeholder="Type a URL or search the web..." 
                               class="flex-1 bg-transparent outline-none text-xl placeholder-[#77777c]"
                               onkeydown="if(event.key==='Enter') newTabLoad('${id}', this.value)">
                        <button onclick="newTabLoad('${id}', document.getElementById('newtab-input-${id}').value)" 
                                class="ml-4 px-8 py-3 bg-[#ff0033] hover:bg-[#ff1133] rounded-3xl text-white font-medium">GO</button>
                    </div>
                    
                    <div class="mt-16 grid grid-cols-6 gap-8 text-center">
                        <div onclick="quickLink('${id}', 'https://x.com')" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">𝕏</div><p class="text-xs">𝕏</p></div>
                        <div onclick="quickLink('${id}', 'https://github.com')" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">🐙</div><p class="text-xs">GitHub</p></div>
                        <div onclick="quickLink('${id}', 'https://youtube.com')" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">📺</div><p class="text-xs">YouTube</p></div>
                        <div onclick="quickLink('${id}', 'https://x.ai')" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">✦</div><p class="text-xs">xAI</p></div>
                        <div onclick="quickLink('${id}', 'https://render.com')" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">🚀</div><p class="text-xs">Render</p></div>
                        <div onclick="openSiteMaker()" class="cursor-pointer"><div class="mx-auto w-12 h-12 bg-[#1a1a1f] rounded-2xl flex items-center justify-center text-3xl mb-2">🌐</div><p class="text-xs">Site Maker</p></div>
                    </div>
                </div>
            `
            container.appendChild(contentDiv)
            renderTabs()
            switchTab(id)
        }

        function newTabLoad(tabId, value) {
            const tab = tabs.find(t => t.id === tabId)
            if (!tab) return
            let url = value.trim()
            if (!url) return
            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url
            
            tab.url = url
            tab.title = 'Loading...'
            tab.type = 'web'
            
            const contentDiv = document.getElementById(`content-${tabId}`)
            contentDiv.innerHTML = ''
            
            const iframe = document.createElement('iframe')
            iframe.src = url
            iframe.className = 'w-full h-full border-0 flex-1 iframe-container'
            iframe.setAttribute('sandbox', sandboxEnabled 
                ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' 
                : '')
            iframe.setAttribute('allow', 'fullscreen')
            iframe.setAttribute('allowfullscreen', 'true')
            iframe.onload = () => updateTabInfo(tabId, iframe)
            
            contentDiv.appendChild(iframe)
            renderTabs()
            switchTab(tabId)
        }

        function quickLink(tabId, url) {
            newTabLoad(tabId, url)
        }

        function createWebTab(url) {
            const id = generateId()
            const tab = {
                id: id,
                title: 'Loading...',
                url: url,
                favicon: `https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`,
                type: 'web',
                split: false
            }
            tabs.push(tab)
            
            const container = document.getElementById('contents-container')
            const contentDiv = document.createElement('div')
            contentDiv.id = `content-${id}`
            contentDiv.className = 'tab-content'
            
            const iframe = document.createElement('iframe')
            iframe.src = url
            iframe.className = 'w-full h-full border-0 flex-1 iframe-container'
            iframe.setAttribute('sandbox', sandboxEnabled 
                ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' 
                : '')
            iframe.setAttribute('allow', 'fullscreen')
            iframe.setAttribute('allowfullscreen', 'true')
            iframe.onload = () => updateTabInfo(id, iframe)
            
            contentDiv.appendChild(iframe)
            container.appendChild(contentDiv)
            
            renderTabs()
            switchTab(id)
        }

        // FIXED: better real favicon + title detection (still limited by browser CORS, but now also syncs address bar)
        function updateTabInfo(tabId, iframe) {
            const tab = tabs.find(t => t.id === tabId)
            if (!tab) return
            
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document
                
                // Real title
                if (doc && doc.title && doc.title.trim()) {
                    tab.title = doc.title
                } else {
                    try { tab.title = new URL(iframe.src).hostname.replace('www.', '') } catch(e) {}
                }
                
                // Real favicon (try page <link> first, then Google fallback)
                let favUrl = `https://www.google.com/s2/favicons?sz=32&domain=${new URL(iframe.src).hostname}`
                try {
                    const iconLink = doc.querySelector('link[rel*="icon"]')
                    if (iconLink && iconLink.href) {
                        favUrl = iconLink.href.startsWith('http') ? iconLink.href : new URL(iconLink.href, iframe.src).href
                    }
                } catch(e) {}
                tab.favicon = favUrl
                
                renderTabs()
                
                // Also sync address bar with the actual loaded URL (best we can do)
                if (tab.id === activeTabId) {
                    document.getElementById('address-input').value = iframe.src
                }
            } catch (e) {
                // Cross-origin protection – use hostname fallback (this is the best possible in browser)
                try {
                    const url = new URL(iframe.src)
                    tab.title = url.hostname.replace('www.', '')
                    tab.favicon = `https://www.google.com/s2/favicons?sz=32&domain=${url.hostname}`
                    renderTabs()
                    if (tab.id === activeTabId) document.getElementById('address-input').value = iframe.src
                } catch(err) {}
            }
        }

        function closeTab(id) {
            const index = tabs.findIndex(t => t.id === id)
            if (index === -1) return
            
            const content = document.getElementById(`content-${id}`)
            if (content) content.remove()
            
            tabs.splice(index, 1)
            
            if (tabs.length === 0) {
                createNewTab()
                return
            }
            
            if (activeTabId === id) {
                activeTabId = tabs[Math.max(0, index - 1)].id
            }
            
            renderTabs()
            switchTab(activeTabId)
            
            if (id === siteMakerTabId) siteMakerTabId = null
        }

        function handleAddressSubmit() {
            const input = document.getElementById('address-input').value.trim()
            if (!activeTabId || !input) return
            const tab = tabs.find(t => t.id === activeTabId)
            if (!tab) return
            
            let url = input
            if (!url.startsWith('http')) {
                url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url)
            }
            
            tab.url = url
            tab.title = 'Loading...'
            
            const contentDiv = document.getElementById(`content-${activeTabId}`)
            contentDiv.innerHTML = ''
            
            const iframe = document.createElement('iframe')
            iframe.src = url
            iframe.className = 'w-full h-full border-0 flex-1 iframe-container'
            iframe.setAttribute('sandbox', sandboxEnabled ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' : '')
            iframe.setAttribute('allow', 'fullscreen')
            iframe.setAttribute('allowfullscreen', 'true')
            iframe.onload = () => updateTabInfo(activeTabId, iframe)
            
            contentDiv.appendChild(iframe)
            renderTabs()
        }

        function goBack() {
            const content = document.getElementById(`content-${activeTabId}`)
            const iframe = content ? content.querySelector('iframe') : null
            if (iframe && iframe.contentWindow) iframe.contentWindow.history.back()
        }
        
        function goForward() {
            const content = document.getElementById(`content-${activeTabId}`)
            const iframe = content ? content.querySelector('iframe') : null
            if (iframe && iframe.contentWindow) iframe.contentWindow.history.forward()
        }
        
        function reloadTab() {
            const content = document.getElementById(`content-${activeTabId}`)
            const iframe = content ? content.querySelector('iframe') : null
            if (iframe) iframe.src = iframe.src
        }

        function toggleSandbox() {
            sandboxEnabled = !sandboxEnabled
            const indicator = document.getElementById('sandbox-text')
            indicator.textContent = sandboxEnabled ? 'SANDBOX ON' : 'SANDBOX OFF'
            
            if (!activeTabId) return
            const tab = tabs.find(t => t.id === activeTabId)
            if (!tab || tab.type !== 'web') return
            
            const contentDiv = document.getElementById(`content-${activeTabId}`)
            const oldIframe = contentDiv.querySelector('iframe')
            if (!oldIframe) return
            const currentSrc = oldIframe.src
            
            contentDiv.innerHTML = ''
            const iframe = document.createElement('iframe')
            iframe.src = currentSrc
            iframe.className = 'w-full h-full border-0 flex-1 iframe-container'
            iframe.setAttribute('sandbox', sandboxEnabled 
                ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' 
                : '')
            iframe.setAttribute('allow', 'fullscreen')
            iframe.setAttribute('allowfullscreen', 'true')
            iframe.onload = () => updateTabInfo(activeTabId, iframe)
            contentDiv.appendChild(iframe)
        }

        // Split view (now per-tab and resets cleanly on switch)
        function toggleSplitView() {
            if (!activeTabId) return
            const tab = tabs.find(t => t.id === activeTabId)
            if (!tab || tab.type !== 'web') return
            
            tab.split = !tab.split
            const contentDiv = document.getElementById(`content-${activeTabId}`)
            if (!contentDiv) return
            
            const iframes = contentDiv.querySelectorAll('iframe')
            const currentMainUrl = iframes.length > 0 ? iframes[0].src : tab.url
            
            contentDiv.innerHTML = ''
            
            if (tab.split) {
                contentDiv.style.flexDirection = 'row'
                
                const left = document.createElement('div')
                left.className = 'flex-1 border-r border-[#222226]'
                const leftIframe = document.createElement('iframe')
                leftIframe.src = currentMainUrl
                leftIframe.className = 'w-full h-full border-0 iframe-container'
                leftIframe.setAttribute('sandbox', sandboxEnabled ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' : '')
                leftIframe.setAttribute('allow', 'fullscreen')
                leftIframe.setAttribute('allowfullscreen', 'true')
                left.appendChild(leftIframe)
                contentDiv.appendChild(left)
                
                const right = document.createElement('div')
                right.className = 'flex-1'
                const rightIframe = document.createElement('iframe')
                rightIframe.src = 'https://www.google.com'
                rightIframe.className = 'w-full h-full border-0 iframe-container'
                rightIframe.setAttribute('sandbox', sandboxEnabled ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' : '')
                rightIframe.setAttribute('allow', 'fullscreen')
                rightIframe.setAttribute('allowfullscreen', 'true')
                right.appendChild(rightIframe)
                contentDiv.appendChild(right)
                
                const header = document.createElement('div')
                header.className = 'absolute top-0 left-1/2 -translate-x-1/2 bg-[#111113] text-[#ff0033] text-xs font-mono px-6 py-px rounded-b-3xl shadow-md flex items-center gap-2 z-10'
                header.innerHTML = `SPLIT VIEW <span onclick="toggleSplitView();event.stopImmediatePropagation()" class="cursor-pointer text-white ml-4">✕</span>`
                contentDiv.appendChild(header)
            } else {
                contentDiv.style.flexDirection = 'column'
                const iframe = document.createElement('iframe')
                iframe.src = currentMainUrl
                iframe.className = 'w-full h-full border-0 flex-1 iframe-container'
                iframe.setAttribute('sandbox', sandboxEnabled ? 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-fullscreen' : '')
                iframe.setAttribute('allow', 'fullscreen')
                iframe.setAttribute('allowfullscreen', 'true')
                iframe.onload = () => updateTabInfo(activeTabId, iframe)
                contentDiv.appendChild(iframe)
            }
            switchTab(activeTabId) // force re-display
        }

        function addCurrentToBookmarks() {
            hideBookmarksPanel()

        function duplicateTab(tabId) {
            const original = tabs.find(t => t.id === tabId)
            if (!original) return
            createWebTab(original.url)
        }
        
        function closeOtherTabs(tabId) {
            tabs = tabs.filter(t => t.id === tabId)
            document.querySelectorAll('.tab-content').forEach(el => {
                if (el.id !== `content-${tabId}`) el.remove()
            })
            renderTabs()
            switchTab(tabId)
        }
        
        async function viewSource(tabId) {
            const tab = tabs.find(t => t.id === tabId)
            if (!tab || !tab.url || !tab.url.startsWith('http')) {
                alert('View source only available for web pages')
                return
            }
            try {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(tab.url)}`
                const response = await fetch(proxyUrl)
                const sourceCode = await response.text()
                const id = generateId()
                const sourceTab = { id, title: `view-source: ${tab.url}`, url: 'kbrowser://viewsource', favicon: 'https://www.google.com/s2/favicons?sz=32&domain=example.com', type: 'viewsource', split: false }
                tabs.push(sourceTab)
                
                const container = document.getElementById('contents-container')
                const contentDiv = document.createElement('div')
                contentDiv.id = `content-${id}`
                contentDiv.className = 'tab-content'
                contentDiv.innerHTML = `<pre class="p-6 font-mono text-xs overflow-auto text-emerald-300 whitespace-pre-wrap">${sourceCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`
                container.appendChild(contentDiv)
                renderTabs()
                switchTab(id)
            } catch (e) {
                alert('Proxy fetch failed (demo limitation). Full production uses secure backend proxy.')
            }
        }
